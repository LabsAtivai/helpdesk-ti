version: "3.9"

services:
  helpdesk:
    image: helpdesk-ti:latest
    build: .
    container_name: helpdesk-ti
    restart: unless-stopped
    ports:
      - "3098:3098"
    environment:
      - PORT=3098
      - APP_URL=https://help.labsativa.com.br
      - TZ=America/Sao_Paulo
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_TI=${EMAIL_TI}
      - EMAIL_FROM=${EMAIL_FROM}
      - TI_USER=${TI_USER}
      - TI_PASS=${TI_PASS}
    volumes:
      - helpdesk_uploads:/app/public/uploads
    networks:
      - ativaai

volumes:
  helpdesk_uploads:
    driver: local

networks:
  ativaai:
    external: true
