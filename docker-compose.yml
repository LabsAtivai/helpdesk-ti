version: "3.9"

services:
  helpdesk:
    image: helpdesk-ti:latest
    build: .
    container_name: helpdesk-ti
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_TI=${EMAIL_TI}
      - EMAIL_FROM=${EMAIL_FROM}
    volumes:
      # Dados persistentes fora do container
      - helpdesk_data:/app/data
      - helpdesk_uploads:/app/public/uploads
    networks:
      - helpdesk-net

volumes:
  helpdesk_data:
    driver: local
  helpdesk_uploads:
    driver: local

networks:
  helpdesk-net:
    driver: bridge
